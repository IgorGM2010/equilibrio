<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EQUILÍBRIO - A Saúde Mental na Vida de um Estudante</title>
  <style>
    :root {
      --bg: #DCF0F2;
      --surface: #FFFFFF;
      --title: #1D9E75;
      --primary: #C9A0D0;
      --text: #333333;
      --text-muted: #666666;

      --pensamento: #534AB7;
      --emocao: #993556;
      --comportamento: #0F6E56;
      --saude: #854F0B;

      --pensamento-bg: #EEEDFE;
      --pensamento-text: #3C3489;
      --emocao-bg: #F7E8EE;
      --emocao-text: #7A2946;
      --comportamento-bg: #E3F3EE;
      --comportamento-text: #0B5C48;
      --saude-bg: #F6EBDD;
      --saude-text: #6D3F08;

      --adapt-bg: #E1F5EE;
      --adapt-border: #1D9E75;
      --adapt-text: #085041;

      --partial-bg: #FAEEDA;
      --partial-border: #BA7517;
      --partial-text: #412402;

      --des-bg: #FCEBEB;
      --des-border: #A32D2D;
      --des-text: #501313;

      --radius-pill: 50px;
      --tr: 300ms ease;
      --shadow-soft: 0 4px 32px rgba(0, 0, 0, 0.07);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    .app {
      position: relative;
      min-height: 100vh;
      background: var(--bg);
    }

    .screen {
      position: absolute;
      inset: 0;
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity var(--tr), visibility var(--tr), transform var(--tr);
    }

    .screen.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(8px);
    }

    .screen-start {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
    }

    .start-card {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border-radius: 28px;
      padding: 2rem;
      box-shadow: var(--shadow-soft);
    }

    .start-title {
      margin: 0 0 1.5rem;
      text-align: center;
      font-size: clamp(2.2rem, 9vw, 42px);
      line-height: 1.05;
      font-weight: 800;
      color: var(--title);
      letter-spacing: 0.01em;
    }

    .btn {
      border: none;
      outline: none;
      cursor: pointer;
      transition: background-color var(--tr), border-color var(--tr), color var(--tr), opacity var(--tr), transform var(--tr);
      font-family: inherit;
    }

    .btn:focus-visible {
      box-shadow: 0 0 0 3px rgba(29, 158, 117, 0.2);
    }

    .btn-start {
      width: 100%;
      border-radius: var(--radius-pill);
      background: var(--primary);
      color: #FFFFFF;
      font-weight: 700;
      font-size: 1rem;
      padding: 16px 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
    }

    .btn-start:hover {
      transform: translateY(-1px);
    }

    .screen-game {
      overflow-y: auto;
      padding: 1.5rem 1rem;
    }

    .game-shell {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      transition: opacity var(--tr);
    }

    .game-header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      width: 100%;
    }

    .header-spacer {
      justify-self: start;
      width: 18px;
      height: 18px;
    }

    .header-title {
      justify-self: center;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #999999;
      font-weight: 600;
    }

    .header-close {
      justify-self: end;
      border: none;
      background: transparent;
      color: #999999;
      font-size: 18px;
      line-height: 1;
      padding: 0;
      width: 18px;
      height: 18px;
      cursor: default;
    }

    .indicator-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: center;
      justify-items: center;
      gap: 12px;
      width: 100%;
    }

    .indicator-column {
      text-align: center;
      opacity: 0.25;
      transition: opacity var(--tr);
    }

    .indicator-column.is-active {
      opacity: 1;
    }

    .indicator-emoji {
      display: block;
      font-size: 26px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .indicator-name {
      display: block;
      font-size: 11px;
      letter-spacing: 0.4px;
      color: #666666;
      line-height: 1.2;
    }

    .card {
      background: var(--surface);
      border-radius: 20px;
      border: 2.5px solid var(--pensamento);
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      width: 92%;
      margin: 0 auto;
      transition: border-color var(--tr);
    }

    .card-body {
      padding: 0;
    }

    .situation-text {
      margin: 0;
      padding: 1.1rem 1.4rem;
      text-align: center;
      font-size: 16px;
      font-weight: 500;
      line-height: 1.72;
      text-wrap: pretty;
      color: #222222;
    }

    .context-label {
      margin: 16px 0 0;
      text-align: center;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 1px;
      color: #AAAAAA;
      font-weight: 600;
    }

    .microfeedback {
      margin-top: 0;
      border-top: 0.5px solid #EEEEEE;
      border-left: 3px solid transparent;
      border-radius: 0;
      padding: 0 14px;
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: opacity var(--tr), max-height var(--tr), padding var(--tr), background-color var(--tr), border-left-color var(--tr);
    }

    .microfeedback.show {
      opacity: 1;
      max-height: 240px;
      padding: 12px 14px;
    }

    .microfeedback-badge {
      display: inline-flex;
      align-items: center;
      gap: 0;
      border-radius: 0;
      padding: 0;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .microfeedback-text {
      margin: 0;
      font-size: 13px;
      line-height: 1.6;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      width: 88%;
      margin: 0 auto;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      background: #FFFFFF;
      border: 1px solid #E0E0E0;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
      cursor: pointer;
      transition: background-color 200ms ease, border-color var(--tr), color var(--tr), opacity var(--tr), transform var(--tr);
    }

    .option-btn:hover {
      background: #F5F5F5;
    }

    .option-btn.is-dimmed {
      opacity: 0.3;
      pointer-events: none;
    }

    .next-btn {
      width: 88%;
      margin: 0 auto;
      background: var(--title);
      color: #FFFFFF;
      font-weight: 700;
      border-radius: var(--radius-pill);
      padding: 14px;
      font-size: 15px;
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
      transition: opacity var(--tr), transform var(--tr);
    }

    .next-btn.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .summary {
      background: #FFFFFF;
      border-radius: 16px;
      box-shadow: var(--shadow-soft);
      padding: 1rem;
      margin-top: 1rem;
    }

    .summary h2 {
      margin: 0 0 0.65rem;
      font-size: 1.1rem;
      color: var(--title);
    }

    .summary p {
      margin: 0;
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .score-list {
      list-style: none;
      margin: 0.8rem 0 0;
      padding: 0;
      display: grid;
      gap: 0.5rem;
    }

    .score-item {
      background: #F7FBFB;
      border: 1px solid #E6EFF0;
      border-radius: 10px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }

    .summary-actions {
      margin-top: 0.9rem;
    }

    .btn-restart {
      width: 100%;
      border-radius: var(--radius-pill);
      padding: 12px;
      background: var(--primary);
      color: #FFFFFF;
      font-weight: 700;
      font-size: 14px;
    }

    @media (max-width: 430px) {
      .screen-game {
        padding: 1rem;
      }

      .card,
      .options,
      .next-btn {
        width: 96%;
      }

      .situation-text {
        font-size: 15.5px;
        padding: 1rem 1.2rem;
      }

      .option-btn {
        padding: 13px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section id="startScreen" class="screen screen-start">
      <div class="start-card">
        <h1 class="start-title">EQUILÍBRIO</h1>
        <button id="startBtn" class="btn btn-start" type="button" aria-label="Iniciar avaliação">
          <span aria-hidden="true">▶</span>
          <span>Iniciar Avaliação</span>
        </button>
      </div>
    </section>

    <section id="gameScreen" class="screen screen-game is-hidden" aria-live="polite">
      <main class="game-shell">
        <div class="game-header">
          <div class="header-spacer" aria-hidden="true"></div>
          <div id="progressText" class="header-title">CARTA 1 DE 12</div>
          <button id="closeBtn" class="header-close" type="button" aria-label="Fechar">✕</button>
        </div>

        <div id="indicatorGrid" class="indicator-grid">
          <div class="indicator-column" data-indicator="Pensamento">
            <span class="indicator-emoji">💡</span>
            <span class="indicator-name">Pensamento</span>
          </div>
          <div class="indicator-column" data-indicator="Saúde física">
            <span class="indicator-emoji">☀️</span>
            <span class="indicator-name">Saúde física</span>
          </div>
          <div class="indicator-column" data-indicator="Emoção">
            <span class="indicator-emoji">🩷</span>
            <span class="indicator-name">Emoção</span>
          </div>
          <div class="indicator-column" data-indicator="Comportamento">
            <span class="indicator-emoji">🧠</span>
            <span class="indicator-name">Comportamento</span>
          </div>
        </div>

        <article id="card" class="card">
          <div class="card-body">
            <p id="contextText" class="context-label"></p>
            <p id="situationText" class="situation-text"></p>

            <div id="microfeedback" class="microfeedback" role="status" aria-live="polite">
              <div id="feedbackBadge" class="microfeedback-badge">
                <span id="feedbackTypeLabel"></span>
              </div>
              <p id="feedbackText" class="microfeedback-text"></p>
            </div>
          </div>
        </article>

        <div id="options" class="options"></div>

        <button id="nextBtn" class="btn next-btn" type="button">Próxima carta →</button>

        <section id="summary" class="summary" hidden>
          <h2>Avaliação concluída</h2>
          <p>Veja como cada indicador acumulou pontos ao longo das cartas.</p>
          <ul id="scoreList" class="score-list"></ul>
          <div class="summary-actions">
            <button id="restartBtn" class="btn btn-restart" type="button">Jogar novamente</button>
          </div>
        </section>
      </main>
    </section>
  </div>

  <script>
    const INDICATOR_STYLE = {
      "Pensamento": {
        color: "#E8A020"
      },
      "Emoção": {
        color: "#D4537E"
      },
      "Comportamento": {
        color: "#C9A0D0"
      },
      "Saúde física": {
        color: "#E8A020"
      }
    };

    const RESPONSE_STYLE = {
      adaptativo: {
        bg: "#E1F5EE",
        border: "#1D9E75",
        text: "#085041",
        label: "Resposta adaptativa"
      },
      parcial: {
        bg: "#FAEEDA",
        border: "#BA7517",
        text: "#412402",
        label: "Resposta parcialmente adaptativa"
      },
      desadaptativo: {
        bg: "#FCEBEB",
        border: "#A32D2D",
        text: "#501313",
        label: "Resposta desadaptativa"
      }
    };

    const cartas = [

      // ─── PENSAMENTO ───

      {
        indicadores: ["Pensamento"],
        contexto: "ESCOLA",
        situacao: "Você tirou uma nota baixa numa prova que estudou bastante. Ao ver o resultado, seu primeiro pensamento foi: \"Sou burro mesmo, não adianta tentar.\"",
        opcoes: [
          {
            texto: "Essa nota não define minha capacidade. Vou entender onde errei e me preparar melhor.",
            tipo: "adaptativo",
            pontos: 2,
            feedback: "Pensamentos como \"sou burro\" são chamados de distorções cognitivas. Eles parecem verdadeiros, mas são generalizações que ignoram seu esforço e sua capacidade real de aprender."
          },
          {
            texto: "Realmente não tenho jeito pra isso. Vou desistir de tentar nessa matéria.",
            tipo: "desadaptativo",
            pontos: 0,
            feedback: "Pensamentos como \"sou burro\" são chamados de distorções cognitivas. Eles parecem verdadeiros, mas são generalizações que ignoram seu esforço e sua capacidade real de aprender."
          },
          {
            texto: "Tudo bem, foi só essa prova. Mas continuei achando que não sou bom o suficiente.",
            tipo: "parcial",
            pontos: 1,
            feedback: "Pensamentos como \"sou burro\" são chamados de distorções cognitivas. Eles parecem verdadeiros, mas são generalizações que ignoram seu esforço e sua capacidade real de aprender."
          }
        ]
      },

      {
        indicadores: ["Pensamento"],
        contexto: "CASA",
        situacao: "Você está tentando estudar, mas fica se comparando com um colega que parece entender tudo com facilidade. Você começa a pensar que nunca vai chegar ao nível dele.",

          {
            texto: "Cada um tem seu ritmo. O que importa é o meu progresso, não o dele.",

            pontos: 2,

          },
          {
            texto: "Vou tentar estudar mais, mas no fundo acho que ele é simplesmente mais inteligente.",
            tipo: "parcial",
            pontos: 1,
            feedback: "Comparações constantes alimentam a insegurança. Na maioria das vezes, você só vê o resultado do outro — não o esforço, as dúvidas e os erros que ele também tem."
          }
        ]
      },

      {
        indicadores: ["Pensamento"],
        contexto: "ESCOLA",
        situacao: "Você vai apresentar um trabalho para a turma e, antes de começar, pensa: \"Vou travar, todo mundo vai rir de mim e achar que sou ridículo.\"",

          {
            texto: "Melhor fingir que estou doente e não apresentar. Não aguento essa situação.",

          },
          {
            texto: "Vou apresentar, mas já estou convicto de que vai ser um fracasso.",
            tipo: "parcial",
            pontos: 1,
            feedback: "Antecipar catástrofes é um padrão de pensamento muito comum em situações de exposição. O problema é que essa \"previsão\" aumenta a ansiedade e muitas vezes não se confirma na realidade."
          }
        ]
      },

      // ─── EMOÇÃO ───

      {
        indicadores: ["Emoção"],

          {

      {

      {

          {

            feedback: "Sentir-se deslocado em ambientes sociais é mais comum do que parece. Evitar sistematicamente essas situações reforça a crença de que você não consegue lidar com elas — e o isolamento aumenta com o tempo."

      // ─── COMPORTAMENTO ───

          {

      {

          {

          },
          {

      // ─── SAÚDE FÍSICA ───

            feedback: "Negligenciar a alimentação em períodos de estresse é comum, mas contraproducente. O cérebro precisa de nutrição para se concentrar e memorizar. Adiar o autocuidado \"para depois\" costuma piorar o desempenho que você estava tentando proteger."
          },
          {
            texto: "Levo uma barrinha de cereal pra escola. Não é ideal, mas é algo.",
            tipo: "parcial",
            pontos: 1,
            feedback: "Negligenciar a alimentação em períodos de estresse é comum, mas contraproducente. O cérebro precisa de nutrição para se concentrar e memorizar. Adiar o autocuidado \"para depois\" costuma piorar o desempenho que você estava tentando proteger."

      {

        contexto: "CASA",
        situacao: "Você percebe que faz semanas que não sai de casa além da escola, não pratica nenhuma atividade física e está se sentindo pesado e sem motivação.",
        opcoes: [
          {
            texto: "Vou começar com algo pequeno — uma caminhada curta ou 15 minutos de alongamento.",

          },
          {

          },
          {

          }

    ];

    const state = {
      indiceAtual: 0,
      respondeu: false,
      pontuacoes: {
        "Pensamento": 0,
        "Emoção": 0,
        "Comportamento": 0,
        "Saúde física": 0
      }
    };

    const el = {
      startScreen: document.getElementById("startScreen"),
      gameScreen: document.getElementById("gameScreen"),
      startBtn: document.getElementById("startBtn"),
      closeBtn: document.getElementById("closeBtn"),
      progressText: document.getElementById("progressText"),
      indicatorGrid: document.getElementById("indicatorGrid"),
      card: document.getElementById("card"),
      situationText: document.getElementById("situationText"),
      contextText: document.getElementById("contextText"),
      microfeedback: document.getElementById("microfeedback"),
      feedbackBadge: document.getElementById("feedbackBadge"),
      feedbackTypeLabel: document.getElementById("feedbackTypeLabel"),
      feedbackText: document.getElementById("feedbackText"),
      options: document.getElementById("options"),
      nextBtn: document.getElementById("nextBtn"),
      summary: document.getElementById("summary"),
      scoreList: document.getElementById("scoreList"),
      restartBtn: document.getElementById("restartBtn")
    };

    function embaralhar(lista) {
      const copia = [...lista];
      for (let i = copia.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const temp = copia[i];
        copia[i] = copia[j];
        copia[j] = temp;
      }
      return copia;
    }

    function mostrarTelaJogo() {
      el.startScreen.classList.add("is-hidden");
      el.gameScreen.classList.remove("is-hidden");
    }

    function obterEstiloIndicador(indicador) {
      return INDICATOR_STYLE[indicador] || INDICATOR_STYLE["Pensamento"];
    }

    function renderIndicadores(indicadores) {
      const colunas = el.indicatorGrid.querySelectorAll(".indicator-column");
      colunas.forEach((coluna) => {
        const nome = coluna.getAttribute("data-indicator");
        const ativo = indicadores.includes(nome);
        coluna.classList.toggle("is-active", ativo);
      });
    }

    function resetFeedback() {
      el.microfeedback.classList.remove("show");
      el.microfeedback.style.background = "transparent";
      el.microfeedback.style.borderLeftColor = "transparent";
      el.feedbackBadge.style.background = "transparent";
      el.feedbackBadge.style.color = "inherit";
      el.feedbackTypeLabel.textContent = "";
      el.feedbackText.textContent = "";
      el.nextBtn.classList.remove("show");
    }

    function renderCarta() {
      const total = cartas.length;
      const atual = state.indiceAtual;

      if (atual >= total) {
        renderResumoFinal();
        return;
      }

      state.respondeu = false;
      el.summary.hidden = true;
      el.nextBtn.classList.remove("show");
      el.options.hidden = false;
      el.card.hidden = false;

      const carta = cartas[atual];
      const principal = carta.indicadores[0];
      const principalStyle = obterEstiloIndicador(principal);

      el.progressText.textContent = "CARTA " + (atual + 1) + " DE " + total;

      renderIndicadores(carta.indicadores);

      el.card.style.borderColor = principalStyle.color;
      el.situationText.textContent = carta.situacao;
      el.contextText.textContent = carta.contexto || "";

      resetFeedback();
      renderOpcoes(carta);
    }

    function renderOpcoes(carta) {
      el.options.innerHTML = "";

      const opcoes = embaralhar(carta.opcoes);
      opcoes.forEach((opcao) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "option-btn";
        btn.textContent = opcao.texto;
        btn.addEventListener("click", () => selecionarOpcao(carta, opcao, btn));
        el.options.appendChild(btn);
      });
    }

    function aplicarPontuacao(carta, pontos) {
      carta.indicadores.forEach((indicador) => {
        if (Object.prototype.hasOwnProperty.call(state.pontuacoes, indicador)) {
          state.pontuacoes[indicador] += pontos;
        }
      });
    }

    function selecionarOpcao(carta, opcaoEscolhida, botaoEscolhido) {
      if (state.respondeu) {
        return;
      }

      state.respondeu = true;
      aplicarPontuacao(carta, opcaoEscolhida.pontos);

      const style = RESPONSE_STYLE[opcaoEscolhida.tipo];
      botaoEscolhido.style.background = style.bg;
      botaoEscolhido.style.borderColor = style.border;
      botaoEscolhido.style.color = style.text;

      const botoes = el.options.querySelectorAll(".option-btn");
      botoes.forEach((btn) => {
        if (btn !== botaoEscolhido) {
          btn.classList.add("is-dimmed");
        }
      });

      el.microfeedback.style.background = style.bg;
      el.microfeedback.style.borderLeftColor = style.border;
      el.microfeedback.style.color = style.text;

      el.feedbackBadge.style.background = "transparent";
      el.feedbackBadge.style.color = style.text;
      if (opcaoEscolhida.tipo === "adaptativo") {
        el.feedbackTypeLabel.textContent = "✓ Resposta adaptativa (+2)";
      } else if (opcaoEscolhida.tipo === "parcial") {
        el.feedbackTypeLabel.textContent = "~ Parcialmente adaptativa (+1)";
      } else {
        el.feedbackTypeLabel.textContent = "✕ Resposta desadaptativa (0)";
      }
      el.feedbackText.textContent = opcaoEscolhida.feedback;
      el.microfeedback.classList.add("show");

      window.setTimeout(() => {
        el.nextBtn.classList.add("show");
      }, 400);
    }

    function renderResumoFinal() {
      el.card.hidden = true;
      el.options.hidden = true;
      el.nextBtn.classList.remove("show");
      el.summary.hidden = false;

      el.progressText.textContent = "CARTA 12 DE 12";
      renderIndicadores([]);

      el.scoreList.innerHTML = "";
      Object.keys(state.pontuacoes).forEach((indicador) => {
        const item = document.createElement("li");
        item.className = "score-item";

        const left = document.createElement("span");
        left.textContent = indicador;

        const right = document.createElement("strong");
        right.textContent = state.pontuacoes[indicador] + " pts";

        item.appendChild(left);
        item.appendChild(right);
        el.scoreList.appendChild(item);
      });
    }

    function reiniciarJogo() {
      state.indiceAtual = 0;
      state.respondeu = false;
      state.pontuacoes = {
        "Pensamento": 0,
        "Emoção": 0,
        "Comportamento": 0,
        "Saúde física": 0
      };
      renderCarta();
    }

    el.startBtn.addEventListener("click", () => {
      mostrarTelaJogo();
      window.setTimeout(() => {
        renderCarta();
      }, 80);
    });

    el.nextBtn.addEventListener("click", () => {
      if (!state.respondeu) {
        return;
      }
      state.indiceAtual += 1;
      renderCarta();
    });

    el.closeBtn.addEventListener("click", () => {
      el.gameScreen.classList.add("is-hidden");
      el.startScreen.classList.remove("is-hidden");
    });

    el.restartBtn.addEventListener("click", reiniciarJogo);
  </script>
</body>
