<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EQUILÍBRIO</title>
  <style>
    :root {
      --bg: #DCF0F2;
      --surface: #FFFFFF;
      --title: #1D9E75;
      --primary: #C9A0D0;
      --text: #333333;
      --text-muted: #666666;

      --pensamento: #534AB7;
      --emocao: #993556;
      --comportamento: #0F6E56;
      --saude: #854F0B;

      --pensamento-bg: #EEEDFE;
      --pensamento-text: #3C3489;
      --emocao-bg: #F7E8EE;
      --emocao-text: #7A2946;
      --comportamento-bg: #E3F3EE;
      --comportamento-text: #0B5C48;
      --saude-bg: #F6EBDD;
      --saude-text: #6D3F08;

      --adapt-bg: #E1F5EE;
      --adapt-border: #1D9E75;
      --adapt-text: #085041;

      --partial-bg: #FAEEDA;
      --partial-border: #BA7517;
      --partial-text: #412402;

      --des-bg: #FCEBEB;
      --des-border: #A32D2D;
      --des-text: #501313;

      --radius-pill: 50px;
      --tr: 300ms ease;
      --shadow-soft: 0 4px 32px rgba(0, 0, 0, 0.07);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    .app {
      position: relative;
      min-height: 100vh;
      background: var(--bg);
    }

    .screen {
      position: absolute;
      inset: 0;
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity var(--tr), visibility var(--tr), transform var(--tr);
    }

    .screen.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(8px);
    }

    .screen-start {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
    }

    .start-card {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border-radius: 28px;
      padding: 2rem;
      box-shadow: var(--shadow-soft);
    }

    .start-title {
      margin: 0 0 1.5rem;
      text-align: center;
      font-size: clamp(2.2rem, 9vw, 42px);
      line-height: 1.05;
      font-weight: 800;
      color: var(--title);
      letter-spacing: 0.01em;
    }

    .btn {
      border: none;
      outline: none;
      cursor: pointer;
      transition: background-color var(--tr), border-color var(--tr), color var(--tr), opacity var(--tr), transform var(--tr);
      font-family: inherit;
    }

    .btn:focus-visible {
      box-shadow: 0 0 0 3px rgba(29, 158, 117, 0.2);
    }

    .btn-start {
      width: 100%;
      border-radius: var(--radius-pill);
      background: var(--primary);
      color: #FFFFFF;
      font-weight: 700;
      font-size: 1rem;
      padding: 16px 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
    }

    .btn-start:hover {
      transform: translateY(-1px);
    }

    .screen-game {
      overflow-y: auto;
      padding: 1.5rem 1rem;
    }

    .game-shell {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      transition: opacity var(--tr);
    }

    .game-shell.fade-out {
      opacity: 0;
    }

    .game-header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      width: 100%;
    }

    .header-spacer {
      justify-self: start;
      width: 18px;
      height: 18px;
    }

    .header-title {
      justify-self: center;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #999999;
      font-weight: 600;
    }

    .header-close {
      justify-self: end;
      border: none;
      background: transparent;
      color: #999999;
      font-size: 18px;
      line-height: 1;
      padding: 0;
      width: 18px;
      height: 18px;
      cursor: default;
    }

    .indicator-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: center;
      justify-items: center;
      gap: 12px;
      width: 100%;
    }

    .indicator-column {
      text-align: center;
      opacity: 0.25;
      transition: opacity var(--tr);
    }

    .indicator-column.is-active {
      opacity: 1;
    }

    .indicator-emoji {
      display: block;
      font-size: 26px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .indicator-name {
      display: block;
      font-size: 11px;
      letter-spacing: 0.4px;
      color: #666666;
      line-height: 1.2;
    }

    .card {
      background: var(--surface);
      border-radius: 20px;
      border: 2.5px solid var(--pensamento);
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      width: 92%;
      margin: 0 auto;
      transition: border-color var(--tr);
    }

    .card-body {
      padding: 0;
    }

    .situation-text {
      margin: 0;
      padding: 1.1rem 1.4rem;
      text-align: center;
      font-size: 16px;
      font-weight: 500;
      line-height: 1.72;
      text-wrap: pretty;
      color: #222222;
    }

    .context-label {
      margin: 16px 0 0;
      text-align: center;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 1px;
      color: #AAAAAA;
      font-weight: 600;
    }

    .microfeedback {
      margin-top: 0;
      border-top: 0.5px solid #EEEEEE;
      border-left: 3px solid transparent;
      border-radius: 0;
      padding: 0 14px;
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: opacity var(--tr), max-height var(--tr), padding var(--tr), background-color var(--tr), border-left-color var(--tr);
    }

    .microfeedback.show {
      opacity: 1;
      max-height: 240px;
      padding: 12px 14px;
    }

    .microfeedback-badge {
      display: inline-flex;
      align-items: center;
      gap: 0;
      border-radius: 0;
      padding: 0;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .microfeedback-text {
      margin: 0;
      font-size: 13px;
      line-height: 1.6;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      width: 88%;
      margin: 0 auto;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      background: #FFFFFF;
      border: 1px solid #E0E0E0;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
      cursor: pointer;
      transition: background-color 200ms ease, border-color var(--tr), color var(--tr), opacity var(--tr), transform var(--tr);
    }

    .option-btn:hover {
      background: #F5F5F5;
    }

    .option-btn.is-dimmed {
      opacity: 0.3;
      pointer-events: none;
    }

    .next-btn {
      width: 88%;
      margin: 0 auto;
      background: var(--title);
      color: #FFFFFF;
      font-weight: 700;
      border-radius: var(--radius-pill);
      padding: 14px;
      font-size: 15px;
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
      transition: opacity var(--tr), transform var(--tr);
    }

    .next-btn.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .summary {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: #DCF0F2;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
      overflow-y: auto;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity var(--tr), transform var(--tr);
    }

    .summary[hidden] {
      display: none !important;
    }

    .summary.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .summary-card {
      background: #FFFFFF;
      border-radius: 20px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
      max-width: 480px;
      width: 100%;
      margin: auto;
      padding: 1.5rem 1rem;
    }

    .result-journey-title {
      margin: 0 0 0.35rem;
      text-align: center;
      font-size: clamp(2rem, 4.8vw, 2.35rem);
      font-weight: 800;
      letter-spacing: 0.5px;
      line-height: 1.05;
      color: #1D9E75;
      text-transform: uppercase;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.65);
    }

    .result-journey-text {
      margin: 0.7rem 0 1.2rem;
      font-size: 15px;
      color: #444444;
      line-height: 1.7;
      text-align: center;
    }

    .result-section-title {
      margin: 0 0 16px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #999999;
      font-weight: 600;
    }

    .panorama-list {
      display: grid;
      gap: 10px;
      margin-bottom: 1.2rem;
    }

    .panorama-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .panorama-label {
      width: 160px;
      font-size: 14px;
      font-weight: 500;
      color: #333333;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .panorama-track {
      flex: 1;
      height: 8px;
      border-radius: 4px;
      background: #E8E8E8;
      overflow: hidden;
    }

    .panorama-fill {
      height: 100%;
      width: 0;
      border-radius: 4px;
      transition: width 600ms ease;
    }

    .panorama-status {
      min-width: 130px;
      white-space: nowrap;
      text-align: right;
      font-size: 11px;
      font-weight: 600;
    }

    .padrao-grid {
      display: flex;
      flex-direction: row;
      gap: 12px;
      margin-bottom: 1.2rem;
    }

    .pattern-card {
      flex: 1;
      border-radius: 14px;
      padding: 16px;
    }

    .pattern-card strong {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .pattern-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 0.45rem;
    }

    .pattern-text {
      margin: 0;
      font-size: 13px;
      line-height: 1.6;
    }

    .pattern-strong {
      background: #E1F5EE;
      border-left: 3px solid #1D9E75;
      color: #085041;
    }

    .pattern-strong .pattern-badge {
      color: #1D9E75;
    }

    .pattern-dev {
      background: #FFF8F0;
      border-left: 3px solid #E8A020;
      color: #412402;
    }

    .pattern-dev .pattern-badge {
      color: #BA7517;
    }

    .reflection-list {
      display: grid;
      gap: 10px;
      margin-bottom: 1.2rem;
    }

    .reflection-item {
      background: #F7F7F7;
      border-radius: 12px;
      padding: 14px;
      font-size: 14px;
      color: #444444;
      line-height: 1.65;
    }

    .result-ethics {
      text-align: center;
      font-size: 12px;
      color: #AAAAAA;
      line-height: 1.6;
      padding: 0 1rem;
      margin: 0;
    }

    .summary-actions {
      margin-top: 16px;
      display: flex;
      justify-content: center;
    }

    .btn-restart {
      width: 88%;
      border-radius: var(--radius-pill);
      padding: 14px;
      background: var(--primary);
      color: #FFFFFF;
      font-weight: 700;
      font-size: 15px;
    }

    @media (max-width: 430px) {
      .screen-game {
        padding: 1rem;
      }

      .card,
      .options,
      .next-btn {
        width: 96%;
      }

      .situation-text {
        font-size: 15.5px;
        padding: 1rem 1.2rem;
      }

      .option-btn {
        padding: 13px 14px;
      }

      .panorama-row {
        flex-wrap: wrap;
        gap: 6px;
      }

      .panorama-label,
      .panorama-status {
        width: auto;
      }

      .panorama-track {
        width: 100%;
        flex: 0 0 100%;
      }
    }

    @media (max-width: 479px) {
      .padrao-grid {
        flex-direction: column;
      }

      .pattern-card {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section id="startScreen" class="screen screen-start">
      <div class="start-card">
        <h1 class="start-title">EQUILÍBRIO</h1>
        <button id="startBtn" class="btn btn-start" type="button" aria-label="Iniciar avaliação">
          <span aria-hidden="true">▶</span>
          <span>Iniciar Avaliação</span>
        </button>
      </div>
    </section>

    <section id="gameScreen" class="screen screen-game is-hidden" aria-live="polite">
      <main class="game-shell">
        <div class="game-header">
          <div class="header-spacer" aria-hidden="true"></div>
          <div id="progressText" class="header-title">CARTA 1 DE 12</div>
          <button id="closeBtn" class="header-close" type="button" aria-label="Fechar">✕</button>
        </div>

        <div id="indicatorGrid" class="indicator-grid">
          <div class="indicator-column" data-indicator="Pensamento">
            <span class="indicator-emoji">💡</span>
            <span class="indicator-name">Pensamento</span>
          </div>
          <div class="indicator-column" data-indicator="Saúde física">
            <span class="indicator-emoji">☀️</span>
            <span class="indicator-name">Saúde física</span>
          </div>
          <div class="indicator-column" data-indicator="Emoção">
            <span class="indicator-emoji">🩷</span>
            <span class="indicator-name">Emoção</span>
          </div>
          <div class="indicator-column" data-indicator="Comportamento">
            <span class="indicator-emoji">🧠</span>
            <span class="indicator-name">Comportamento</span>
          </div>
        </div>

        <article id="card" class="card">
          <div class="card-body">
            <p id="contextText" class="context-label"></p>
            <p id="situationText" class="situation-text"></p>

            <div id="microfeedback" class="microfeedback" role="status" aria-live="polite">
              <div id="feedbackBadge" class="microfeedback-badge">
                <span id="feedbackTypeLabel"></span>
              </div>
              <p id="feedbackText" class="microfeedback-text"></p>
            </div>
          </div>
        </article>

        <div id="options" class="options"></div>

        <button id="nextBtn" class="btn next-btn" type="button">Próxima carta →</button>

        <section id="summary" class="summary" hidden>
          <div class="summary-card">
            <h2 class="result-journey-title">Sua Jornada</h2>
            <p id="journeyText" class="result-journey-text"></p>

            <h3 class="result-section-title">Seu panorama</h3>
            <div id="panoramaList" class="panorama-list"></div>

            <h3 class="result-section-title">Seu padrão predominante</h3>
            <div class="padrao-grid">
              <article class="pattern-card pattern-strong">
                <span class="pattern-badge">✦ Ponto forte</span>
                <strong id="strongIndicatorName"></strong>
                <p id="strongIndicatorText" class="pattern-text"></p>
              </article>
              <article class="pattern-card pattern-dev">
                <span class="pattern-badge">○ Área a desenvolver</span>
                <strong id="weakIndicatorName"></strong>
                <p id="weakIndicatorText" class="pattern-text"></p>
              </article>
            </div>

            <h3 class="result-section-title">Para refletir</h3>
            <div id="reflectionList" class="reflection-list"></div>

            <p class="result-ethics">Este jogo tem fins psicoeducativos e não substitui avaliação ou acompanhamento de um profissional de saúde mental.</p>

            <div class="summary-actions">
              <button id="restartBtn" class="btn btn-restart" type="button">Jogar novamente</button>
            </div>
          </div>
        </section>
      </main>
    </section>
  </div>

  <script>
    const INDICATOR_STYLE = {
      "Pensamento": {
        color: "#E8A020"
      },
      "Emoção": {
        color: "#D4537E"

    const cartas = [

          {

      {

    function classificarIndicador(percentual) {
      if (percentual >= 75) {
        return { texto: "✦ Adaptativo", cor: "indicador" };
      }
      if (percentual >= 50) {
        return { texto: "◎ Em desenvolvimento", cor: "#BA7517" };
      }
      return { texto: "○ A fortalecer", cor: "#A32D2D" };
    }

    function classificarGeral(media) {
      if (media >= 75) {
        return "alta";
      }
      if (media >= 50) {
        return "media";
      }
      return "baixa";
    }

    function textoSaudacao(classificacao) {
      if (classificacao === "alta") {
        return "Você demonstrou padrões bastante saudáveis ao longo dessa jornada. Suas escolhas refletem autoconsciência e cuidado consigo mesmo. Continue assim!";
      }
      if (classificacao === "media") {
        return "Você tem pontos fortes importantes — e também áreas com espaço para crescer. Isso é completamente normal e faz parte do processo de autoconhecimento.";
      }
      return "Essa jornada revelou algumas áreas que merecem sua atenção. Reconhecer isso já é um primeiro passo importante. Lembre-se: pequenas mudanças fazem grande diferença.";
    }

    function calcularResultados() {
      const maximos = {
        "Pensamento": 0,
        "Saúde física": 0,
        "Emoção": 0,
        "Comportamento": 0
      };

      cartas.forEach((carta) => {
        carta.indicadores.forEach((indicador) => {
          if (Object.prototype.hasOwnProperty.call(maximos, indicador)) {
            maximos[indicador] += 2;
          }
        });
      });

      const percentuais = {};
      RESULT_ORDER.forEach((indicador) => {
        const maximo = maximos[indicador] || 0;
        const obtido = state.pontuacoes[indicador] || 0;
        percentuais[indicador] = maximo > 0 ? Math.round((obtido / maximo) * 100) : 0;
      });

      const media = Math.round(RESULT_ORDER.reduce((acc, indicador) => acc + percentuais[indicador], 0) / RESULT_ORDER.length);
      return { maximos, percentuais, media };
    }

    function embaralhar(lista) {
      const copia = [...lista];
      for (let i = copia.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const temp = copia[i];
        copia[i] = copia[j];
        copia[j] = temp;
      }
      return copia;
    }

    function mostrarTelaJogo() {
      el.startScreen.classList.add("is-hidden");
      el.gameScreen.classList.remove("is-hidden");
    }

    function obterEstiloIndicador(indicador) {
      return INDICATOR_STYLE[indicador] || INDICATOR_STYLE["Pensamento"];
    }

    function renderIndicadores(indicadores) {
      const colunas = el.indicatorGrid.querySelectorAll(".indicator-column");
      colunas.forEach((coluna) => {
        const nome = coluna.getAttribute("data-indicator");
        const ativo = indicadores.includes(nome);
        coluna.classList.toggle("is-active", ativo);
      });
    }

    function resetFeedback() {
      el.microfeedback.classList.remove("show");
      el.microfeedback.style.background = "transparent";
      el.microfeedback.style.borderLeftColor = "transparent";
      el.feedbackBadge.style.background = "transparent";
      el.feedbackBadge.style.color = "inherit";
      el.feedbackTypeLabel.textContent = "";
      el.feedbackText.textContent = "";
      el.nextBtn.classList.remove("show");
    }

    function renderCarta() {
      const total = cartas.length;
      const atual = state.indiceAtual;

      if (atual >= total) {
        transicaoParaResultados();
        return;
      }

      state.respondeu = false;
      el.gameShell.classList.remove("fade-out");
      el.summary.hidden = true;
      el.summary.classList.remove("show");
      el.nextBtn.classList.remove("show");
      el.options.hidden = false;
      el.card.hidden = false;
      el.gameHeader.hidden = false;
      el.indicatorGrid.hidden = false;

      const carta = cartas[atual];
      const principal = carta.indicadores[0];
      const principalStyle = obterEstiloIndicador(principal);

      el.progressText.textContent = "CARTA " + (atual + 1) + " DE " + total;

      renderIndicadores(carta.indicadores);

      el.card.style.borderColor = principalStyle.color;
      el.situationText.textContent = carta.situacao;
      el.contextText.textContent = carta.contexto || "";

      resetFeedback();
      renderOpcoes(carta);
    }

    function transicaoParaResultados() {
      el.gameShell.classList.add("fade-out");
      window.setTimeout(() => {
        renderResumoFinal();
        el.gameShell.classList.remove("fade-out");
      }, 300);
    }

    function renderOpcoes(carta) {
      el.options.innerHTML = "";

      const opcoes = embaralhar(carta.opcoes);
      opcoes.forEach((opcao) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "option-btn";
        btn.textContent = opcao.texto;
        btn.addEventListener("click", () => selecionarOpcao(carta, opcao, btn));
        el.options.appendChild(btn);
      });
    }

    function aplicarPontuacao(carta, pontos) {
      carta.indicadores.forEach((indicador) => {
        if (Object.prototype.hasOwnProperty.call(state.pontuacoes, indicador)) {
          state.pontuacoes[indicador] += pontos;
        }
      });
    }

    function selecionarOpcao(carta, opcaoEscolhida, botaoEscolhido) {
      if (state.respondeu) {
        return;
      }

      state.respondeu = true;
      aplicarPontuacao(carta, opcaoEscolhida.pontos);

      const style = RESPONSE_STYLE[opcaoEscolhida.tipo];
      botaoEscolhido.style.background = style.bg;
      botaoEscolhido.style.borderColor = style.border;
      botaoEscolhido.style.color = style.text;

      const botoes = el.options.querySelectorAll(".option-btn");
      botoes.forEach((btn) => {
        if (btn !== botaoEscolhido) {
          btn.classList.add("is-dimmed");
        }
      });

      el.microfeedback.style.background = style.bg;
      el.microfeedback.style.borderLeftColor = style.border;
      el.microfeedback.style.color = style.text;

      el.feedbackBadge.style.background = "transparent";
      el.feedbackBadge.style.color = style.text;
      if (opcaoEscolhida.tipo === "adaptativo") {
        el.feedbackTypeLabel.textContent = "✓ Resposta adaptativa (+2)";
      } else if (opcaoEscolhida.tipo === "parcial") {
        el.feedbackTypeLabel.textContent = "~ Parcialmente adaptativa (+1)";
      } else {
        el.feedbackTypeLabel.textContent = "✕ Resposta desadaptativa (0)";
      }
      el.feedbackText.textContent = opcaoEscolhida.feedback;
      el.microfeedback.classList.add("show");

      window.setTimeout(() => {
        el.nextBtn.classList.add("show");
      }, 400);
    }

    function renderResumoFinal() {
      const resultado = calcularResultados();
      const classificacaoGeral = classificarGeral(resultado.media);

      el.card.hidden = true;
      el.options.hidden = true;
      el.nextBtn.classList.remove("show");
      el.summary.hidden = false;
      el.gameHeader.hidden = true;
      el.indicatorGrid.hidden = true;

      el.progressText.textContent = "CARTA 12 DE 12";
      renderIndicadores([]);

      el.journeyText.textContent = textoSaudacao(classificacaoGeral);

      el.panoramaList.innerHTML = "";
      const fillsParaAnimar = [];
      RESULT_ORDER.forEach((indicador) => {
        const percentual = resultado.percentuais[indicador];
        const status = classificarIndicador(percentual);
        const meta = RESULT_META[indicador];

        const row = document.createElement("div");
        row.className = "panorama-row";

        const label = document.createElement("div");
        label.className = "panorama-label";
        label.textContent = meta.emoji + " " + indicador;

        const track = document.createElement("div");
        track.className = "panorama-track";

        const fill = document.createElement("div");
        fill.className = "panorama-fill";
        fill.style.background = meta.color;
        fill.style.width = "0%";
        track.appendChild(fill);

        const statusText = document.createElement("div");
        statusText.className = "panorama-status";
        statusText.textContent = status.texto;
        statusText.style.color = status.cor === "indicador" ? meta.color : status.cor;

        row.appendChild(label);
        row.appendChild(track);
        row.appendChild(statusText);
        el.panoramaList.appendChild(row);

        fillsParaAnimar.push({ fill, percentual });
      });

      const desc = [...RESULT_ORDER].sort((a, b) => resultado.percentuais[b] - resultado.percentuais[a]);
      const asc = [...RESULT_ORDER].sort((a, b) => resultado.percentuais[a] - resultado.percentuais[b]);

      let forte = desc[0];
      let desenvolver = asc[0];

      if (forte === desenvolver) {
        forte = desc.find((indicador) => indicador !== desenvolver) || desc[0];
        desenvolver = asc.find((indicador) => indicador !== forte) || asc[0];
      }

      el.strongIndicatorName.textContent = RESULT_META[forte].emoji + " " + forte;
      el.strongIndicatorText.textContent = RESULT_META[forte].forte;
      el.weakIndicatorName.textContent = RESULT_META[desenvolver].emoji + " " + desenvolver;
      el.weakIndicatorText.textContent = RESULT_META[desenvolver].desenvolver;

      const menorDois = [];
      asc.forEach((indicador) => {
        if (menorDois.length < 2 && !menorDois.includes(indicador)) {
          menorDois.push(indicador);
        }
      });

      el.reflectionList.innerHTML = "";
      menorDois.forEach((indicador) => {
        const item = document.createElement("div");
        item.className = "reflection-item";
        item.textContent = "💡 " + RESULT_META[indicador].dica;
        el.reflectionList.appendChild(item);
      });

      el.summary.classList.remove("show");
      void el.summary.offsetWidth;
      window.setTimeout(() => {
        el.summary.classList.add("show");
      }, 10);

      window.setTimeout(() => {
        fillsParaAnimar.forEach(({ fill, percentual }) => {
          fill.style.width = percentual + "%";
        });
      }, 400);
    }

    function reiniciarJogo() {
      state.indiceAtual = 0;
      state.respondeu = false;
      state.pontuacoes = {
        "Pensamento": 0,
        "Emoção": 0,
        "Comportamento": 0,
        "Saúde física": 0
      };
      if (!el.summary.hidden) {
        el.summary.classList.remove("show");
        el.gameShell.classList.add("fade-out");
        window.setTimeout(() => {
          el.summary.hidden = true;
          renderCarta();
          window.requestAnimationFrame(() => {
            el.gameShell.classList.remove("fade-out");
          });
        }, 300);
      } else {
        renderCarta();
      }
    }

    el.startBtn.addEventListener("click", () => {
      mostrarTelaJogo();
      window.setTimeout(() => {
        renderCarta();
      }, 80);
    });

    el.nextBtn.addEventListener("click", () => {
      if (!state.respondeu) {
        return;
      }
      state.indiceAtual += 1;
      renderCarta();
    });

    el.closeBtn.addEventListener("click", () => {
      el.gameScreen.classList.add("is-hidden");
      el.startScreen.classList.remove("is-hidden");
    });

    el.restartBtn.addEventListener("click", reiniciarJogo);
  </script>
</body>
</html>
